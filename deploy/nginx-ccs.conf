# CCS Platform — ccs.nxai.com.au

server {
    listen 80 default_server;
    server_name ccs.nxai.com.au _;
    return 301 https://ccs.nxai.com.au$request_uri;
}

server {
    listen 443 ssl;
    server_name ccs.nxai.com.au;

    ssl_certificate /etc/letsencrypt/live/ccs.nxai.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ccs.nxai.com.au/privkey.pem;

    root /var/www/ccs-frontend/dist;
    index index.html;

    client_max_body_size 50M;

    location = / {
        return 301 /rebrand;
    }

    # React SPA — catch-all serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI — strip /api prefix
    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # FastAPI direct routes
    location /rebrand {
        proxy_pass http://127.0.0.1:8001/rebrand;
        proxy_set_header Host $host;
    }

    location /distribution {
        proxy_pass http://127.0.0.1:8001/distribution;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    location /email-opens {
        try_files $uri /index.html;
    }

    location /app {
        try_files $uri /index.html;
    }

    location /ccs-msds-track {
        proxy_pass http://127.0.0.1:8001/ccs-msds-track;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8001/health;
    }

    location /documents/ {
        proxy_pass http://127.0.0.1:8001/documents/;
        proxy_set_header Host $host;
    }
}
